# =============================================================================
# Famous Person Profile Agent — Deploy to Cloudflare Pages
# =============================================================================
# Runs on every push to main. Builds the Vite/React app and deploys to Pages.
# Requires CLOUDFLARE_API_TOKEN set as a GitHub Actions secret.
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          command: pages deploy dist --project-name=vijayakumarchinta-profile-builder
